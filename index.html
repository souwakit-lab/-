<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>誘導公式訓練助手</title>
<style>
  *{box-sizing:border-box;font-family:Microsoft JhengHei,sans-serif}
  html,body{margin:0;padding:0;width:100%;height:100%;background:#f4f8ff;}
  body{position:relative;padding:10px;}
  .card{background:rgba(255,255,255,0.97);border-radius:20px;padding:16px;max-width:500px;width:100%;margin:0 auto;box-shadow:0 0 10px rgba(0,0,0,0.1);}
  .title{text-align:center;font-size:22px;font-weight:bold;margin:10px 0 14px;}
  .input-row{display:flex;gap:8px;margin-bottom:12px;width:100%;}
  .input-row select,.input-row input{flex:1;padding:12px 6px;border-radius:10px;border:1px solid #ccc;font-size:15px;text-align:center;min-width:0;}
  input#studentName{background:#f0f0f0;}
  .start-btn{width:100%;padding:14px;background:#378cf9;color:white;border:none;border-radius:12px;font-size:18px;margin-bottom:12px;font-weight:bold;}
  .start-btn:disabled{background:#ccc;}
  .level{text-align:center;margin:10px 0;}
  .level button{padding:10px 14px;margin:0 6px;border-radius:10px;border:none;background:#ddd;font-size:16px;}
  .level .on{background:#378cf9;color:white;}
  .info{display:flex;justify-content:space-between;margin:8px 0;font-size:15px;}
  .msg{text-align:center;color:red;font-size:16px;height:24px;font-weight:bold;}
  .q{text-align:center;font-size:24px;margin:20px 0;font-weight:bold;}
  #input{width:100%;padding:14px;text-align:center;border-radius:12px;border:2px solid #ccc;font-size:20px;margin-bottom:10px;}
  .keypad{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0;}
  .key{padding:16px 8px;border:none;border-radius:12px;background:#eef2f5;font-size:18px;}
  .func{background:#d1f7e5;font-weight:bold;}
  .btn-bar{display:flex;gap:10px;margin-top:12px;}
  .btn-bar button{flex:1;padding:14px 8px;border:none;border-radius:12px;color:white;font-size:16px;font-weight:bold;}
  .reset{background:#ff6666}
  .ok{background:#378cf9}
  .luck{background:#ffaa33}
  .next{background:#33bb55}
  .upload{background:#378cf9}
</style>
</head>
<body>

<div class="card">
  <div class="title">誘導公式訓練助手</div>

  <div class="input-row">
    <select id="className" onchange="updateStudentList()">
      <option value="">請選班別</option>
      <option value="高一甲">高一甲</option>
      <option value="高一乙">高一乙</option>
      <option value="高一丙">高一丙</option>
      <option value="高一丁">高一丁</option>
    </select>

    <select id="studentId" onchange="autoFillName()" disabled>
      <option value="">請選學號</option>
    </select>

    <input id="studentName" placeholder="姓名" disabled readonly>
  </div>

  <div class="level">
    <button id="lv1" onclick="setLevel(1)">程度一</button>
    <button id="lv2" onclick="setLevel(2)">程度二</button>
  </div>

  <button class="start-btn" id="startBtn" onclick="startGame()" disabled>開始答題</button>

  <div class="info">
    <div>分數: <span id="score">0</span></div>
    <div>幸運卡: <span id="luck">0</span>/2</div>
  </div>
  <div class="info">
    <div>答對題數: <span id="correctCount">0</span></div>
    <div>答對率: <span id="rate">0%</span></div>
    <div>時間: <span id="time">00:00</span></div>
  </div>

  <div class="msg" id="msg"></div>
  <div class="q" id="q"></div>
  <input id="input" readonly>

  <div class="keypad">
    <button class="key" onclick="insert('+')">+</button>
    <button class="key" onclick="insert('-')">-</button>
    <button class="key func" onclick="insert('sin')">sin</button>
    <button class="key func" onclick="insert('cos')">cos</button>
    <button class="key func" onclick="insert('tan')">tan</button>
    <button class="key" onclick="insert('7')">7</button>
    <button class="key" onclick="insert('8')">8</button>
    <button class="key" onclick="insert('9')">9</button>
    <button class="key" onclick="insert('4')">4</button>
    <button class="key" onclick="insert('5')">5</button>
    <button class="key" onclick="insert('6')">6</button>
    <button class="key" onclick="insert('°')">°</button>
    <button class="key" onclick="insert('1')">1</button>
    <button class="key" onclick="insert('2')">2</button>
    <button class="key" onclick="insert('3')">3</button>
    <button class="key" onclick="insert('0')">0</button>
  </div>

  <div class="btn-bar">
    <button class="reset" onclick="del()">清除</button>
    <button class="ok" onclick="check()">確認</button>
    <button class="luck" onclick="useLuck()">使用幸運卡</button>
    <button class="upload" onclick="uploadScore()">上傳分數</button>
    <button class="nextBtn" id="nextBtn" onclick="next()">下一題</button>
  </div>
</div>

<script>
let score = 0;
let luck = 0;
let level = null;
let ans = "";
let currentMul = 1;
let locked = false;
let gameStarted = false;

let totalQ = 0;
let correctQ = 0;
let streak = 0;

let startTime = null;
let timer = null;
let lastUpload = 0;

const studentData = {

    {"id":"6","name":"李奕燊"},{"id":"7","name":"李霆慧"},{"id":"8","name":"林芷康"},{"id":"9","name":"林香妮"},{"id":"...
