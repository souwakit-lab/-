<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>誘導公式訓練助手</title>
<style>
  *{box-sizing:border-box;font-family:Microsoft JhengHei,sans-serif}
  html,body{
    margin:0;padding:0;
    width:100%;height:100%;
    background:#f4f8ff;
  }
  body{
    position:relative;
    padding:10px;
  }
  body::before{
    content:"";
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
    background:url("data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAAAAAAAD/4QBYRXhpZgAATU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAAkSTAAIAAAAEAAAAKgAA/9sAQwAIBgYHBgUIBwcHCQkICgwLDQoKFA4QCg4bHRQdHRQmGi8bLy8uLSoyKyU+RTU+QDg4Pz0/RDpCQj4/RElDRERkPTdPSEhPezW7e3p7O0lERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERERH/wgARCAHAAoADAREAAhEBAxEB/8QAFAABAAAAAAAAAAAAAAAAAAAACf/EABQQAQAAAAAAAAAAAAAAAAAAAAD/xAAUAQEAAAAAAAAAAAAAAAAAAAAA/9oADAMBAAIRAxEAPwD5/AAAAAAAAAAAAAAAAAAD/2Q==");
    background-size:cover;
    background-position:center;
    opacity:0.2;
    z-index:-1;
  }
  .card{
    background:rgba(255,255,255,0.97);
    border-radius:20px;
    padding:16px;
    max-width:500px;
    width:100%;
    margin:0 auto;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
  }
  .title{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin:10px 0 14px;
  }
  .input-row{
    display:flex;
    gap:8px;
    margin-bottom:12px;
    width:100%;
  }
  .input-row select,
  .input-row input{
    flex:1;
    padding:12px 6px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
    text-align:center;
    min-width:0;
  }
  .start-btn{
    width:100%;
    padding:14px;
    background:#378cf9;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    margin-bottom:12px;
    font-weight:bold;
  }
  .start-btn:disabled{
    background:#ccc;
  }
  .level{
    text-align:center;
    margin:10px 0;
  }
  .level button{
    padding:10px 14px;
    margin:0 6px;
    border-radius:10px;
    border:none;
    background:#ddd;
    font-size:16px;
  }
  .level .on{
    background:#378cf9;
    color:white;
  }
  .info{
    display:flex;
    justify-content:space-between;
    margin:12px 0;
    font-size:15px;
  }
  .msg{
    text-align:center;
    color:red;
    font-size:16px;
    height:24px;
    font-weight:bold;
  }
  .q{
    text-align:center;
    font-size:24px;
    margin:20px 0;
    font-weight:bold;
  }
  #input{
    width:100%;
    padding:14px;
    text-align:center;
    border-radius:12px;
    border:2px solid #ccc;
    font-size:20px;
    margin-bottom:10px;
  }
  .keypad{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin:10px 0;
  }
  .key{
    padding:16px 8px;
    border:none;
    border-radius:12px;
    background:#eef2f5;
    font-size:18px;
  }
  .func{
    background:#d1f7e5;
    font-weight:bold;
  }
  .btn-bar{
    display:flex;
    gap:10px;
    margin-top:12px;
  }
  .btn-bar button{
    flex:1;
    padding:14px 8px;
    border:none;
    border-radius:12px;
    color:white;
    font-size:16px;
    font-weight:bold;
  }
  .reset{background:#ff6666}
  .ok{background:#378cf9}
  .luck{background:#ffaa33}
  .next{background:#33bb55;display:none}
  .upload{background:#7733cc}
  .upload:disabled{background:#999}
</style>
</head>
<body>

<div class="card">
  <div class="title">誘導公式訓練助手</div>

  <div class="input-row">
    <select id="className">
      <option value="">請選班別</option>
      <option>高一甲</option>
      <option>高一乙</option>
      <option>高一丙</option>
      <option>高一丁</option>
      <option>高一戊</option>
    </select>
    <input id="studentId" placeholder="學號">
    <input id="studentName" placeholder="姓名">
  </div>

  <button class="start-btn" id="startBtn" onclick="startGame()">開始答題</button>

  <div class="level">
    <button id="lv1" onclick="setLevel(1)">程度一</button>
    <button id="lv2" onclick="setLevel(2)">程度二</button>
  </div>

  <div class="info">
    <div>分數: <span id="score">0</span></div>
    <div>連對: <span id="streak">0</span></div>
    <div>幸運卡: <span id="luck">0</span>/2</div>
  </div>

  <div class="msg" id="msg"></div>
  <div class="q" id="q"></div>
  <input id="input" readonly>

  <div class="keypad">
    <button class="key" onclick="insert('+')">+</button>
    <button class="key" onclick="insert('-')">-</button>
    <button class="key func" onclick="insert('sin')">sin</button>
    <button class="key func" onclick="insert('cos')">cos</button>
    <button class="key func" onclick="insert('tan')">tan</button>
    <button class="key" onclick="insert('7')">7</button>
    <button class="key" onclick="insert('8')">8</button>
    <button class="key" onclick="insert('9')">9</button>
    <button class="key" onclick="insert('4')">4</button>
    <button class="key" onclick="insert('5')">5</button>
    <button class="key" onclick="insert('6')">6</button>
    <button class="key" onclick="insert('°')">°</button>
    <button class="key" onclick="insert('1')">1</button>
    <button class="key" onclick="insert('2')">2</button>
    <button class="key" onclick="insert('3')">3</button>
    <button class="key" onclick="insert('0')">0</button>
  </div>

  <div class="btn-bar">
    <button class="reset" onclick="del()">清除</button>
    <button class="ok" onclick="check()">確認</button>
    <button class="luck" onclick="useLuck()">使用幸運卡</button>
    <button class="upload" onclick="uploadScore()" id="uploadBtn">上傳分數</button>
    <button class="next" id="nextBtn" onclick="next()">下一題</button>
  </div>
</div>

<script>
let score = 0;
let streak = 0;
let luck = 0;
let level = 1;
let ans = "";
let currentMul = 1;
let locked = false;
let gameStarted = false;
let lastUpload = 0;

const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxqVyxzWRdqdd42PCeqTc52F4UnFPkhwpnHslg8ALkzeF5RAFHmrton69mHUHdT0gn2/exec";
const funs = ["sin","cos","tan"];

function startGame() {
  const cname = document.getElementById("className").value.trim();
  const sid = document.getElementById("studentId").value.trim();
  const sname = document.getElementById("studentName").value.trim();

  if (!cname || !sid || !sname) {
    alert("請完成：班別、學號、姓名");
    return;
  }

  gameStarted = true;
  document.getElementById("className").disabled = true;
  document.getElementById("studentId").disabled = true;
  document.getElementById("studentName").disabled = true;
  document.getElementById("startBtn").disabled = true;
  next();
}

function canUpload() {
  return Date.now() - lastUpload >= 60000;
}

function setLevel(n){
  level = n;
  currentMul = 1;
  locked = false;
  document.getElementById("lv1").classList.toggle("on",n===1);
  document.getElementById("lv2").classList.toggle("on",n===2);
  if (gameStarted) next();
}

function randNonAxis(){
  const t = Math.floor(Math.random()*3);
  if(t===0) return 95 + 5*Math.floor(Math.random()*16);
  if(t===1) return 185 + 5*Math.floor(Math.random()*16);
  return 275 + 5*Math.floor(Math.random()*16);
}

function randNegShallow(){
  return -(5 + 5*Math.floor(Math.random()*17));
}

function genQ_Level2(){
  const f = funs[Math.floor(Math.random()*3)];
  const t = Math.floor(Math.random()*3);
  let angle;
  if(t===0){
    const a = 10+5*Math.floor(Math.random()*17);
    angle = -360 + a;
  } else if(t===1){
    const a = 10+5*Math.floor(Math.random()*17);
    angle = -(90+a);
  } else {
    const a = 10+5*Math.floor(Math.random()*17);
    angle = 180+a;
  }
  return calc(f,angle);
}

function calc(f,angle){
  const r = ((angle%360)+360)%360;
  let ref;
  if(r<=90) ref=r;
  else if(r<=180) ref=180-r;
  else if(r<=270) ref=r-180;
  else ref=360-r;

  let sign="";
  if(f==="sin" && r>180) sign="-";
  if(f==="cos" && (r>90 && r<270)) sign="-";
  if(f==="tan" && ((r>90&&r<180)||(r>270&&r<360))) sign="-";

  ans = sign + f + ref + "°";
  return angle<0 ? f+"(-"+Math.abs(angle)+"°) = ?" : f+angle+"° = ?";
}

function genQ(){
  const f = funs[Math.floor(Math.random()*3)];
  if(level===1){
    const angle = Math.random()<0.5 ? randNonAxis() : randNegShallow();
    return calc(f,angle);
  } else {
    return genQ_Level2();
  }
}

function insert(s){
  if(locked || !gameStarted) return;
  document.getElementById("input").value += s;
}
function del(){
  if(locked || !gameStarted) return;
  document.getElementById("input").value = "";
}

function useLuck(){
  if(locked || luck<1 || !gameStarted) return;
  luck--;
  currentMul = Math.random()<0.5 ? 2 : 3;
  showMsg("幸運卡：×"+currentMul+"倍！");
  next();
  update();
}

function next(){
  locked = false;
  currentMul = 1;
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("q").innerText = genQ();
  del();
  showMsg("");
}

function check(){
  if(locked || !gameStarted) return;
  const u = document.getElementById("input").value.trim();
  const mul = currentMul;
  if(u === ans){
    score += mul;
    streak++;
    if(streak>=2 && luck<2){
      luck++;
      streak=0;
    }
    showMsg("正確！ +"+mul);
  } else {
    score -= mul;
    streak=0;
    showMsg("答錯："+ans);
    locked = true;
    document.getElementById("nextBtn").style.display = "block";
  }
  update();
}

function showMsg(s){
  document.getElementById("msg").innerText = s;
}
function update(){
  document.getElementById("score").innerText = score;
  document.getElementById("streak").innerText = streak;
  document.getElementById("luck").innerText = luck;
}

function uploadScore(){
  if (!gameStarted) {
    alert("請先開始答題");
    return;
  }
  if (!canUpload()) {
    alert("提交太頻繁，請等待 1 分鐘後再試");
    return;
  }

  const cname = document.getElementById("className").value.trim();
  const sid = document.getElementById("studentId").value.trim();
  const sname = document.getElementById("studentName").value.trim();

  fetch(GOOGLE_URL,{
    method:"POST",
    body:JSON.stringify({
      className: cname,
      studentId: sid,
      studentName: sname,
      score: score,
      level: level===1?"一":"二",
      luckUsed: 2-luck
    })
  }).then(res=>res.json()).then(data=>{
    alert(data.msg);
    lastUpload = Date.now();
  });
}

setLevel(1);
</script>
</body>
</html>
